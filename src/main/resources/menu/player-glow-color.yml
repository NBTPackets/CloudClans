#
# [set-member-glow-color] #RRGGBB или R;G;B — устанавливает личный цвет участнику
# [reset-member-glow-color] — сбрасывает на общий цвет клана
#
# Плейсхолдеры:
# {player_name} - ник участника
# {player_uuid} - uuid участника
# {current_color} - текущий цвет (#HEX + пометка личный/клановый)
# {clan_name} - название клана
#
menu:
  title: "<black>Цвет свечения {player_name}"
  size: 45

  items:
    - material: PLAYER_HEAD
      slot: 4
      name: "<#5FBCF1>♯ <gray>| <white>{player_name}"
      lore:
        - ""
        - " <gray>— <white>Текущий цвет:"
        - " <gray>   <#5FBCF1>{current_color}"
        - ""
        - " <gray>— <white>Выберите новый цвет ниже"
        - " <gray>   <white>или сбросьте на клановый"
        - ""
      skull-owner: "{player_uuid}"
      left_click_actions:
        - "[sound] UI_BUTTON_CLICK;0.7;1.2"
      right_click_actions:
        - "[sound] UI_BUTTON_CLICK;0.7;1.2"

    - material: RED_DYE
