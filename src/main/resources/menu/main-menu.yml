# Действия:
# [player] - выполняет команду от имени игрока
# [console] - выполняет команду от консоли ( {player} и {uuid} )
# [title] заголовок;подзаголовок;fadeIn;stay;fadeOut - показывает тайтл и субтайтл игроку (время в тиках)
# [actionbar] текст;длительность - показівает игрока акшионбар (время в тиках)
# [effect] эффект;длительность;уровень - дает эффект игроку (время в тиках)
# [close] - закрывает меню
# [sound] звук;громкость;тон - проигрывает игрока звук
# [open_menu] - открывает меню
# [message] - отправить сообщение игроку
#
# Клики:
# left_click_actions: - левый клик
# right_click_actions: - правый клик
#
# Плейсхолдеры:
# {clan_name} - название клана
# {clan_owner} - никнейм лидера клана
# {clan_level} - текущий уровень клана
# {clan_exp} - текущее количество опыта клана
# {clan_required_exp} - сколько опыта нужно для следующего уровня
# {clan_exp_to_next} - сколько опыта осталось до следующего уровня
# {clan_members_current} - текущее количество участников
# {clan_members_max} - максимальное количество участников
# {clan_members_info} - краткая форма участников (типо сразу 1/5)
# {clan_balance} - показывает скольок монет в казне клана
#
menu:
  title: "&0Клан {clan_name}"
  size: 27
  items:
    - material: BELL
      slot: 13
      name: "<#DC332E>♯ <gray>| <white>Информация о клане"
      lore:
        - ""
        - " <white>Клан: <#DC332E>{clan_name}"
        - " <white>Лидер: <#DC332E>{clan_owner}"
        - " <white>Уровень: <#DC332E>{clan_level}"
        - " <white>Опыт: <#DC332E>{clan_exp} <gray>/ <#DC332E>{clan_required_exp}"
        - " <white>До след. уровня: <#DC332E>{clan_exp_to_next}"
        - " <white>Участники: <#DC332E>{clan_members_current}<gray>/<#DC332E>{clan_members_max}"
        - " <white>Казна: <#DC332E>{clan_balance} $"
        - ""
      left_click_actions:
        - "[sound] UI_BUTTON_CLICK;0.7;1.2"
      right_click_actions:
        - "[sound] UI_BUTTON_CLICK;0.7;1.2"

    - material: CAMPFIRE
      slot: 15
      name: "<#F83A66>🧪 <gray>| <white>Участники клана"
      lore:
        - ""
        - " <white>Участников: <#F83A66>{clan_members_info}"
        - " <white>Онлайн: <#F83A66>{members_online} чел."
        - ""
      left_click_actions:
        - "[open_menu] player-list"
        - "[sound] BOOK_PAGE_TURN;1.0;1.0"
      right_click_actions:
        - "[open_menu] player-list"
        - "[sound] BOOK_PAGE_TURN;1.0;1.0"

    - material: AMETHYST_SHARD
      slot: 11
      name: "<#5FBCF1>⌛ <gray>| <white>Настройка свечения"
      lore:
        - ""
        - " <white>Настраивай подсветку <#5FBCF1>соклановцев"
        - ""
      left_click_actions:
        - "[open_menu] glow"
        - "[sound] BOOK_PAGE_TURN;1.0;1.0"
      right_click_actions:
        - "[open_menu] glow"
        - "[sound] BOOK_PAGE_TURN;1.0;1.0"